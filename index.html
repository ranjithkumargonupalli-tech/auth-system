<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth System | Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="glass-container">
        <div class="brand">
            <i class="fas fa-shield-alt"></i>
            <h1>SecureAuth</h1>
            <p>Your trusted authentication platform</p>
        </div>
        <div class="forms-wrapper">
            <!-- LOGIN CARD -->
            <div class="form-card" id="loginCard">
                <h2><i class="fas fa-sign-in-alt"></i> Login</h2>
                <form id="loginForm">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="loginUsername" placeholder="Username" required>
                    </div>
                    <div class="input-group password-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Password" required>
                        <i class="fas fa-eye toggle-password" data-target="loginPassword"></i>
                    </div>
                    <button type="submit" class="btn primary">Sign In</button>
                </form>
                <div id="loginMessage" class="message"></div>
                <p class="toggle-form">Don't have an account? <a href="#" id="showOtpRequest">Register here</a></p>
            </div>

            <!-- OTP REQUEST CARD -->
            <div class="form-card hidden" id="otpRequestCard">
                <h2><i class="fas fa-envelope"></i> Verify Email</h2>
                <form id="otpRequestForm">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="otpEmail" placeholder="Enter your email" required>
                    </div>
                    <button type="submit" class="btn primary">Send OTP</button>
                </form>
                <div id="otpRequestMessage" class="message"></div>
                <p class="toggle-form">Already have an account? <a href="#" id="backToLoginFromOtp">Login here</a></p>
            </div>

            <!-- REGISTRATION CARD (with OTP) -->
            <div class="form-card hidden" id="registerCard">
                <h2><i class="fas fa-user-plus"></i> Complete Registration</h2>
                <form id="registerForm">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="regUsername" placeholder="Username" required>
                    </div>
                    <div class="input-group password-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="Password" required>
                        <i class="fas fa-eye toggle-password" data-target="regPassword"></i>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-key"></i>
                        <input type="text" id="regOtp" placeholder="Enter OTP" required>
                    </div>
                    <input type="hidden" id="regEmail" value="">
                    <button type="submit" class="btn secondary">Register</button>
                </form>
                <div id="registerMessage" class="message"></div>
                <p class="toggle-form">Want to use a different email? <a href="#" id="backToOtpRequest">Request again</a></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
